<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
        body {
            background: rgb(218, 111, 111);
            font-family: Helvetica;

        }

        h1 {
            color: rgb(185, 80, 80);
            background-color: lightgoldenrodyellow;
            width: 800px;
        }

        h2 {
            font-size: 18px;
            font-family: Arial, Helvetica, sans-serif;
            font-style: italic;
            color: whitesmoke;
            background-color: null;
        }

        h3 {
            font-size: 18px;
            color: rgb(124, 9, 9);
            background-color: lightpink;
            width: 600px;
        }

        img {
            border-radius: 20px;
            border: 5px;
            border-style: dashed;
            border-color: lightgoldenrodyellow;
        }

        ul {
            font-size: 18px;
            color: rgb(236, 222, 222);
        }
    </style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
                    /* Part 2: Build the HTML elements here and append them to the body */
                    // puts the json in the body and prints it -- commented out, not sure why this was put here. why reverse output?!
                    // bodyElement.append(reverseString(xhr.responseText))
                    const myMovies = JSON.parse(xhr.responseText);

                    myMovies.forEach(movie => {
                        /*                     const div = document.createElement("div");
                                               console.log(movie); // for check in browser console; OUT COMMENT LATER!
                                               div.textContent = movie.Title; // capital T!!!
                                               bodyElement.appendChild(div);
                       */
                        const h1 = document.createElement("h1");
                        h1.textContent = movie.Title;
                        bodyElement.appendChild(h1);

                        const poster = document.createElement("img");
                        poster.src = movie.Poster;
                        bodyElement.appendChild(poster);

                        //how to add more empty space and put release+runtime on same height?
                        const released = document.createElement("h2");
                        released.textContent = "Release date: " + movie.Released;
                        bodyElement.appendChild(released);

                        const runtime = document.createElement("h2");
                        runtime.textContent = "Runtime: " + movie.Runtime + "min";
                        bodyElement.appendChild(runtime);

                        const genres = document.createElement("h2");
                        genres.textContent = "Genres: " //+ movie.Genres;
                        bodyElement.appendChild(genres);

                        const LSgenres = document.createElement("ul"); // "unordered list"
                        // String to array:
                        movie.Genres.forEach(genre => {
                            const li = document.createElement("li");
                            li.textContent = genre;
                            LSgenres.appendChild(li);
                            console.log(movie.Genres);
                        });
                        bodyElement.appendChild(LSgenres);

                        const directors = document.createElement("h2");
                        directors.textContent = "Director: " //+ movie.Directors;
                        bodyElement.appendChild(directors);

                        const LSdirectors = document.createElement("ul");
                        // String to array:
                        movie.Directors.forEach(director => {
                            const li = document.createElement("li");
                            li.textContent = director;
                            LSdirectors.appendChild(li);
                        });
                        bodyElement.appendChild(LSdirectors);

                        const writers = document.createElement("h2");
                        writers.textContent = "Writer(s): " // + movie.Writers;
                        bodyElement.appendChild(writers);

                        const LSwriters = document.createElement("ul"); // "unordered list"
                        // String to array:
                        movie.Writers.forEach(writer => {
                            const li = document.createElement("li");
                            li.textContent = writer;
                            LSwriters.appendChild(li);
                            console.log(movie.Writers);
                        });
                        bodyElement.appendChild(LSwriters);

                        const actors = document.createElement("h2");
                        actors.textContent = "Voice actor(s): " //+ movie.Actors;
                        bodyElement.appendChild(actors);

                        const LSactors = document.createElement("ul"); // "unordered list"
                        // String to array:
                        movie.Actors.forEach(actor => {
                            const li = document.createElement("li");
                            li.textContent = actor;
                            LSactors.appendChild(li);
                            console.log(movie.Actors);
                        });
                        bodyElement.appendChild(LSactors);

                        const plot = document.createElement("h3");
                        plot.textContent = movie.Plot;
                        bodyElement.appendChild(plot);

                        const ratingMetascore = document.createElement("h2");
                        ratingMetascore.textContent = "Metascore: " + movie.Metascore;
                        bodyElement.appendChild(ratingMetascore);

                        const imdbRating = document.createElement("h2");
                        imdbRating.textContent = "IMDb Rating: " + movie.imdbRating;
                        bodyElement.appendChild(imdbRating);

                        //horizontal separation line -- too much with title-bg
                        //const hr = document.createElement("hr");
                        //bodyElement.appendChild(hr);

                    });
                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

</body>

</html>
