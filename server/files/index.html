<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        body {
            background: rgb(230, 190, 190);
            font-family: Arial;
            letter-spacing: 0.3px;

            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
        }

        article {
            background-color: rgb(104, 53, 63);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 3px 3px 3px 3px rgb(110, 96, 103);
            margin: 30px;
            width: auto;
            max-width: 500px;
        }

        article:hover {
            background: rgb(99, 34, 47);
            box-shadow: 5px 5px 5px 5px rgb(71, 59, 65);
        }

        h1 {
            text-align: center;
            color: rgb(85, 28, 37);
            background-color: lightgoldenrodyellow;
            max-width: 100%;
            border-radius: 40px;
        }

        img {
            border-radius: 20px;
            border: 3px;
            border-style: dashed;
            border-color: lightgoldenrodyellow;
            display: block;
            margin: auto;
            margin-bottom: 15px;
            padding: 2px;
        }

        .meta {
            text-align: center;
            font-size: 14px;
            color: rgb(216, 201, 206)
        }

        .genre-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 0px;
            margin-bottom: 40px;
        }

        .genre-list li {
            background-color: rgb(177, 143, 156);
            border-radius: 10px;
            border-style: solid;
            border-color: rgb(216, 201, 206);
            padding: 10px;
            color: rgb(65, 13, 29);
        }

        .card {
            background-color: rgb(238, 233, 213);
            color: rgb(65, 13, 29);
            border-radius: 10px;
            border-style: solid;
            border-color: rgb(216, 201, 206);
            padding: 15px;
            font-size: 18px;
            margin: 20px 10px 40px 10px;

        }

        h2 {
            font-size: 18px;
            color: whitesmoke;
            margin-left: 10px;
            font-weight: 600;
        }

        h3 {
            font-size: 20px;
            font-weight: 500;
            color: rgb(88, 9, 9);
            background-color: rgb(234, 235, 213);
            width: auto;
        }

        ul {
            font-size: 17px;
            color: rgb(236, 222, 222);
            margin-left: 30px;
        }
    </style>

    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {

                    const myMovies = JSON.parse(xhr.responseText);

                    myMovies.forEach(movie => {

                        const article = document.createElement("article");

                        const h1 = document.createElement("h1");
                        h1.textContent = movie.Title;
                        article.appendChild(h1);

                        const poster = document.createElement("img");
                        poster.src = movie.Poster;
                        article.appendChild(poster);

                        const released = document.createElement("h2");

                        const meta = document.createElement("p");
                        meta.classList.add("meta");
                        meta.textContent = movie.Runtime + "min • " + movie.Released;
                        article.appendChild(meta);

                        const ratingMetascore = document.createElement("h2");

                        const imdbRating = document.createElement("h2");

                        const ratings = document.createElement("p");
                        ratings.classList.add("meta");
                        ratings.textContent = movie.imdbRating + " IMDb • " + movie.Metascore + " Metascore";
                        article.appendChild(ratings);

                        const plot = document.createElement("div");
                        plot.classList.add("card");
                        plot.textContent = movie.Plot;
                        article.appendChild(plot);

                        const LSgenres = document.createElement("ul"); // "unordered list"
                        LSgenres.classList.add("genre-list");
                        // String to array:
                        movie.Genres.forEach(genre => {
                            const li = document.createElement("li");
                            li.textContent = genre;
                            LSgenres.appendChild(li);
                            console.log(movie.Genres);
                        });
                        article.appendChild(LSgenres);

                        const directors = document.createElement("h2");
                        directors.textContent = "Director: " //+ movie.Directors;
                        article.appendChild(directors);

                        const LSdirectors = document.createElement("ul");
                        // String to array:
                        movie.Directors.forEach(director => {
                            const li = document.createElement("li");
                            li.textContent = director;
                            LSdirectors.appendChild(li);
                        });
                        article.appendChild(LSdirectors);

                        const writers = document.createElement("h2");
                        writers.textContent = "Writer(s): " // + movie.Writers;
                        article.appendChild(writers);

                        const LSwriters = document.createElement("ul"); // "unordered list"
                        // String to array:
                        movie.Writers.forEach(writer => {
                            const li = document.createElement("li");
                            li.textContent = writer;
                            LSwriters.appendChild(li);
                            console.log(movie.Writers);
                        });
                        article.appendChild(LSwriters);

                        const actors = document.createElement("h2");
                        actors.textContent = "Voice actor(s): " //+ movie.Actors;
                        article.appendChild(actors);

                        const LSactors = document.createElement("ul"); // "unordered list"
                        // String to array:
                        movie.Actors.forEach(actor => {
                            const li = document.createElement("li");
                            li.textContent = actor;
                            LSactors.appendChild(li);
                            console.log(movie.Actors);
                        });
                        article.appendChild(LSactors);

                        bodyElement.appendChild(article);

                    });
                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>

</body>

</html>
